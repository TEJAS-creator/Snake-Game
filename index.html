<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Screens -->
        <div id="start-screen" class="screen active">
            <h1 class="glitch-text" data-text="NEON SNAKE">NEON SNAKE</h1>
            <p>Use Arrow Keys to move.<br>Space to Pause.</p>
            <button id="start-btn" class="glow-btn">START GAME</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="hud">
                <div class="hud-item">
                    <span class="hud-label">SCORE</span>
                    <span id="score" class="hud-value">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">LEVEL</span>
                    <span id="level" class="hud-value">1</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">BEST</span>
                    <span id="high-score" class="hud-value">0</span>
                </div>
            </div>
            
            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                <div id="pause-overlay" class="overlay hidden">
                    <h2>PAUSED</h2>
                </div>
            </div>
        </div>

        <div id="game-over-screen" class="screen">
            <h2>SYSTEM FAILURE</h2>
            <div class="stats">
                <p>SCORE: <span id="final-score">0</span></p>
                <p>LEVEL: <span id="final-level">1</span></p>
            </div>
            <button id="restart-btn" class="glow-btn">REBOOT SYSTEM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
